name: Staging Build

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Rust target (leave blank for native)"
        required: false
        default: ""

jobs:
  tauri-build-macos:
    name: Tauri macOS build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Python deps (face tracker)
        run: pip3 install -r services/face-tracker/requirements.txt

      - name: Install JS deps
        run: npm ci

      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: ${{ inputs.target && format('--target {0}', inputs.target) || '' }}

      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: CyberPet-macos-staging
          path: src-tauri/target/release/bundle/macos/*.app
          retention-days: 14
