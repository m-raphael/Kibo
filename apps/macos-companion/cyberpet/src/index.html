<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CyberPet</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="mascot-card" data-tauri-drag-region>
    <button id="settings-btn" aria-label="Settings" tabindex="0">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="currentColor" aria-hidden="true">
        <path d="M7.5 9.5a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/>
        <path fill-rule="evenodd" d="M6.47.84a1.06 1.06 0 0 1 2.06 0l.2.74c.38.14.73.31 1.06.53l.73-.3a1.06 1.06 0 0 1 1.24.4l1.03 1.78a1.06 1.06 0 0 1-.27 1.37l-.62.45c.03.2.04.4.04.6s-.01.4-.04.6l.62.45a1.06 1.06 0 0 1 .27 1.37l-1.03 1.78a1.06 1.06 0 0 1-1.24.4l-.73-.3a4.3 4.3 0 0 1-1.06.53l-.2.74a1.06 1.06 0 0 1-2.06 0l-.2-.74A4.3 4.3 0 0 1 5.2 9.7l-.73.3a1.06 1.06 0 0 1-1.24-.4L2.2 7.82a1.06 1.06 0 0 1 .27-1.37l.62-.45A4.3 4.3 0 0 1 3.05 5.4c0-.2.01-.4.04-.6l-.62-.45a1.06 1.06 0 0 1-.27-1.37L3.23 1.2a1.06 1.06 0 0 1 1.24-.4l.73.3A4.3 4.3 0 0 1 6.27 1.6l.2-.75Z"/>
      </svg>
    </button>

    <div id="tracker-dot" class="tracker-dot inactive" aria-label="Tracker status"></div>
    <div id="mascot-face" aria-label="Mascot">◕‿◕</div>
    <div id="mascot-state" aria-live="polite">idle</div>
  </div>

  <!-- Settings + Debug overlay -->
  <div id="settings-panel" class="hidden" role="dialog" aria-label="Settings">
    <div id="settings-header">
      <span id="settings-title">Settings</span>
      <button id="settings-close" aria-label="Close settings">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none" aria-hidden="true">
          <path d="M1 1l9 9M10 1L1 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div id="settings-body">
      <div class="setting-section">
        <div class="setting-row">
          <span class="setting-label">Camera</span>
          <span id="camera-status" class="setting-value">—</span>
        </div>
        <button id="grant-btn" class="primary-btn hidden">Grant Access</button>
      </div>

      <div class="divider"></div>

      <div class="setting-section">
        <div class="setting-row">
          <span class="setting-label">Tracker</span>
          <span id="tracker-status" class="setting-value">—</span>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Debug panel -->
      <div id="debug-section">
        <button id="debug-toggle" class="ghost-btn">
          <span id="debug-toggle-label">Show debug</span>
          <svg id="debug-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div id="debug-panel" class="hidden">
          <div class="debug-row"><span>face</span>  <span id="d-face">—</span></div>
          <div class="debug-row"><span>yaw</span>   <span id="d-yaw">—</span></div>
          <div class="debug-row"><span>pitch</span> <span id="d-pitch">—</span></div>
          <div class="debug-row"><span>blink</span> <span id="d-blink">—</span></div>
          <div class="debug-row"><span>smile</span> <span id="d-smile">—</span></div>
          <div class="debug-row"><span>mouth</span> <span id="d-mouth">—</span></div>
        </div>
      </div>

      <p class="privacy-note">
        All processing happens locally. No video is stored or transmitted.
      </p>
    </div>
  </div>

  <script type="module" src="./cyberpet-main.ts"></script>
</body>
</html>
